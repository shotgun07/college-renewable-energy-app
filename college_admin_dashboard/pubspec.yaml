name: college_admin_dashboard
description: Admin Web Dashboard for College Renewable Energy
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  firebase_messaging: ^16.1.1
  firebase_crashlytics: ^5.0.0

  # Notifications (removed unused dependency)

  # Authentication
  google_sign_in: ^7.2.0

  # File Handling
  file_picker: ^10.3.10
  csv: ^6.0.0

  # Storage
  shared_preferences: ^2.3.3

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # UI Components
  photo_view: ^0.15.0
  fl_chart: ^0.70.0
  google_fonts: ^8.0.1
  data_table_2: ^2.5.8

  # PDF and Printing
  pdf: ^3.10.0
  printing: ^5.12.0

  # Utilities
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  encrypt: ^5.0.3
  envied: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.14.0
  riverpod_generator: ^4.0.0+1
  envied_generator: any

flutter:
  uses-material-design: true
  assets:
    - assets/images/
