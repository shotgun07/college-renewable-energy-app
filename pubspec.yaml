name: app
description: College Renewable Energy App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.4.1
  firebase_messaging: ^15.2.1
  firebase_crashlytics: ^4.3.1

  # Notifications - upgrade to latest
  flutter_local_notifications: ^20.0.0

  # Google Sign-In
  google_sign_in: ^7.2.0

  # File handling - upgrade to latest
  file_picker: ^10.3.10
  flutter_plugin_android_lifecycle: ^2.0.22
  image_picker: ^1.2.1

  # Data handling
  csv: ^6.0.0

  # State management (migrated to Riverpod)
  # Local storage
  shared_preferences: ^2.3.3

  # Security - NEW: for production-grade token storage
  flutter_secure_storage: ^10.0.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # UI components
  photo_view: ^0.15.0
  pinput: ^6.0.1
  fl_chart: ^0.70.2

  # Utilities
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  local_auth: ^3.0.0

  # Performance - NEW: for optimized image loading
  cached_network_image: 3.4.1
  google_fonts: ^6.2.1
  envied: any
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  flutter_image_compress: ^2.4.0
  path: ^1.9.1
  path_provider: ^2.1.5
  timezone: ^0.10.1
  record: ^6.2.0
  audioplayers: ^6.5.1
  encrypt: ^5.0.3
  rsa_encrypt: ^2.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_generative_ai: ^0.4.7
  uuid: ^4.5.3
  pointycastle: ^3.9.1
  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_native_splash: ^2.4.1
  flutter_test:
    sdk: flutter

  # Updated lints
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

  # Testing - NEW: for Phase 5 preparation
  mockito: ^5.4.6
  build_runner: ^2.14.0
  envied_generator: any
  riverpod_generator: ^4.0.0+1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/college_logo.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#0D47A1"
  android: true
  ios: true
  android_12:
    color: "#0D47A1"
